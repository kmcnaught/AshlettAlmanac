name: Smoke test

# Runs the headless Node harness against the page on every push / PR that
# touches the app, the data, or the harness itself. Cheap insurance against
# JS regressions when restructuring the tide-load / verse-render flow.

on:
  push:
    paths:
      - 'ashlett-almanac.html'
      - 'tides.json'
      - 'verses.json'
      - 'scripts/smoke_test_html.*'
  pull_request:
    paths:
      - 'ashlett-almanac.html'
      - 'tides.json'
      - 'verses.json'
      - 'scripts/smoke_test_html.*'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: python3 scripts/smoke_test_html.py
